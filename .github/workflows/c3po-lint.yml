# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: c3po pylint and pytest

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # --upgrade forces a current pylint even if requirements.txt pins an old one.
        python -m pip install --upgrade "pylint>=3.1" pytest pytest-cov
    - name: Show versions
      run: |
        python --version
        python -m pylint --version
    - name: Analysing the code with pylint
      # `python -m pylint` guarantees it runs under the interpreter set above,
      # not some other pylint on PATH. --exit-zero keeps lint findings non-blocking,
      # but a genuine crash will now be obvious in the "Show versions" / log output.
      run: |
        python -m pylint --exit-zero $(git ls-files '*.py')
    - name: Test with pytest
      run: |
        ENVIRONMENT=local pytest --cov
