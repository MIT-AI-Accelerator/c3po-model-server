# This workflow will install Python dependencies, run lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: c3po pylint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Free up disk space
      # Removes preinstalled toolchains (~25 GB) so heavy ML wheels fit.
      # Runs before setup-python because it clears the hosted-tool cache;
      # Python is then downloaded fresh.
      run: |
        df -h /
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo docker image prune --all --force || true
        df -h /
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # --no-cache-dir: don't keep downloaded wheels around on disk.
        if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi
        # --upgrade forces a current pylint even if requirements.txt pins an old one.
        python -m pip install --no-cache-dir --upgrade "pylint>=3.1" pytest pytest-cov
    - name: Show versions
      run: |
        python --version
        python -m pylint --version
    - name: Analysing the code with pylint
      # `python -m pylint` guarantees it runs under the interpreter set above,
      # not some other pylint on PATH.
      # --fail-on=E,F: fail only on errors/fatals (bugs + crashes).
      # --fail-under=-100: disable score-based failure so style (C/R/W) is
      #   reported but never fails the build.
      run: |
        python -m pylint --fail-on=E,F --fail-under=-100 $(git ls-files '*.py')
