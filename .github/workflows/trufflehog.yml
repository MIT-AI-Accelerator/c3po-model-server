name: Secret Scan (TruffleHog)

# Scans for committed secrets (API keys, tokens, DB passwords, etc.).
# - On PR: scans the commits added in the PR.
# - Weekly + manual: full-history sweep of the whole repo.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trufflehog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so TruffleHog can diff commits / scan the whole repo.
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          # Scan the checked-out repo. The action auto-detects the PR diff range
          # on pull_request events, and scans full history otherwise.
          path: ./
          # verified = confirmed-live secrets; unknown = couldn't be verified.
          # Drop ",unknown" if you only want high-confidence (live) hits.
          extra_args: --results=verified,unknown
