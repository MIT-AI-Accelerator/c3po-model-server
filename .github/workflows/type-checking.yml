# Static type checking with mypy.
# https://mypy.readthedocs.io/

name: c3po type check

on:
  pull_request:

permissions:
  contents: read

jobs:
  mypy:
    name: mypy
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the project's deps so mypy can resolve real imports
        # (otherwise everything is an "unresolved import" error).
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install mypy

    - name: Run mypy
      # --install-types --non-interactive: auto-pull missing 3rd-party stub
      #   packages (e.g. types-requests) instead of erroring on them.
      # --ignore-missing-imports: don't fail on libraries that ship no stubs.
      run: |
        mypy . \
          --install-types \
          --non-interactive \
          --ignore-missing-imports
